services:
  vault-mcp:
    build: .
    volumes:
      - c:\\Users\\ghoop\\Desktop\\my-brain:/c:\\Users\\ghoop\\Desktop\\my-brain
      - C:\\Users\\ghoop\\AppData\\Local\\Programs\\Obsidian\\Obsidian.exe
    environment:
      - VAULT_ROOT=/vault
      - EXCLUDE_DIRS=${EXCLUDE_DIRS:-.git,.obsidian,node_modules,.trash}
      - API_PORT=${API_PORT:-9400}
    ports:
      - "${API_PORT:-9400}:9400"
    labels:
      - docker-mcp=true
      - docker-mcp-tool-type=streamable-http
      - docker-mcp-name=vault-mcp