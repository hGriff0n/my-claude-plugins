openapi: 3.1.0
info:
  title: Shared Schemas
  version: "1.0"
components:
  schemas:
    TimeBlock:
      type: object
      description: Common time properties carried by most domain objects. All fields nullable; null indicates the value is not set.
      properties:
        created:
          type: string
          format: date
          nullable: true
        last_updated:
          type: string
          format: date
          nullable: true
        due:
          type: string
          format: date
          nullable: true
        scheduled:
          type: string
          format: date
          nullable: true
